<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JeyJSON</title>
  </head>
  <body>
    <div id="root">
      <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease;">
        <div style="font-size: 64px; color: #ffbc00; margin-bottom: 20px; animation: pulse 1.5s infinite ease-in-out;">
            { }
        </div>
        
        <h1 style="color: #ffffff; font-family: sans-serif; letter-spacing: 2px; margin: 0; font-weight: 300;">JEYJSON</h1>
        
        <div style="width: 150px; height: 3px; background-color: #333; margin-top: 30px; border-radius: 2px; overflow: hidden;">
            <div style="width: 40%; height: 100%; background-color: #ffbc00; animation: loading 1.5s infinite linear;"></div>
        </div>

        <style>
            @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
            @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
        </style>
    </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
